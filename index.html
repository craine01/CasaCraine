<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Craine Sanctuary · Staff Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* ── TOKENS ── */
:root {
  --sage:       #8FA866;
  --sage-dark:  #6b8149;
  --sage-deep:  #4a5c33;
  --sage-light: #b8cfa0;
  --sage-pale:  #eef3e8;
  --cream:      #f7f4ee;
  --cream-mid:  #ede9df;
  --cream-dark: #d8d2c4;
  --white:      #ffffff;
  --ink:        #1e2a14;
  --ink-mid:    #3d4f2e;
  --ink-soft:   #6a7c58;
  --ink-ghost:  #9aaa88;
  --red:        #c0392b;
  --amber:      #d48f1a;
  --blue:       #3d6b8f;
  --radius-sm:  8px;
  --radius-md:  16px;
  --radius-lg:  24px;
  --radius-xl:  32px;
  --shadow-sm:  0 2px 8px rgba(30,42,20,.07);
  --shadow-md:  0 6px 24px rgba(30,42,20,.10);
  --shadow-lg:  0 16px 48px rgba(30,42,20,.14);
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body, #root { height:100%; }
body {
  font-family:'DM Sans', sans-serif;
  background:var(--cream);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--sage-light); border-radius:99px; }

/* ════════════════════════════
   LOGIN PAGE
════════════════════════════ */
.login-page {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}

.login-hero {
  flex:1;
  background:
    linear-gradient(180deg, rgba(10,20,8,.55) 0%, rgba(10,20,8,.3) 50%, rgba(10,20,8,.7) 100%),
    url('https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1600&q=80') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:60px 24px 80px;
  min-height:55vh;
  text-align:center;
}

.login-eyebrow {
  font-family:'DM Sans', sans-serif;
  font-size:.72rem;
  font-weight:600;
  letter-spacing:.28em;
  color:rgba(255,255,255,.7);
  text-transform:uppercase;
  margin-bottom:18px;
}

.login-title {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(3rem,8vw,5.5rem);
  font-weight:300;
  color:#fff;
  line-height:1.0;
  margin-bottom:8px;
}

.login-subtitle {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(1.1rem,2.5vw,1.6rem);
  font-weight:400;
  color:rgba(255,255,255,.75);
  letter-spacing:.04em;
  margin-bottom:44px;
}

.login-hero-btns {
  display:flex;
  gap:16px;
}

.hero-btn {                 /*     Ang .hero-btn ay isang class selector. Ibig sabihin, kahit anong button sa website na bibigyan mo ng pangalang, meaning magkakaroon ng ganito.    */
  padding:12px 40px;                 /*     Ito ang space sa loob ng button (pagitan ng text at ng border). padding means space in between   */
  border:1.5px solid rgba(255,255,255,.7);  /*    May manipis na guhit (border) ang button na may kapal na 1.5px. */
  background:transparent;
  color:#fff;
  font-family:'DM Sans',sans-serif; /*  Gagamitin nitong font style ang 'DM Sans'. Kung sakaling hindi ito mag-load sa browser ng user, gagamit ito ng kahit anong default na sans-serif font (yung mga font na malilinis at walang "buntot" tulad ng Arial o Helvetica).   */
  font-size:.78rem;              
  font-weight:600;
  letter-spacing:.14em;
  text-transform:uppercase;
  cursor:pointer;
  transition:.25s;
}
.hero-btn:hover { background:rgba(255,255,255,.12); }
.hero-btn.active { background:rgba(255,255,255,.18); border-color:#fff; }

/* Auth card floating over hero */
.login-card-wrap {
  display:flex;
  justify-content:center;
  padding:0 24px 60px;
  margin-top:-64px;
  position:relative;
  z-index:10;
}

.login-card {
  background:var(--white);
  border-radius:var(--radius-md);
  padding:40px 44px;
  width:100%;
  max-width:480px;
  box-shadow:var(--shadow-lg);
}

.login-card-title {
  font-family:'DM Sans',sans-serif;
  font-size:.7rem;
  font-weight:700;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--sage-dark);
  margin-bottom:28px;
  padding-bottom:16px;
  border-bottom:1px solid var(--cream-mid);
}

.form-row {
  display:grid;
  grid-template-columns:160px 1fr;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
}

.form-row label {
  font-size:.72rem;
  font-weight:600;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--ink-mid);
}

.form-input {
  width:100%;
  padding:10px 14px;
  border:1.5px solid var(--cream-dark);
  border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;
  font-size:.88rem;
  color:var(--ink);
  background:var(--cream);
  outline:none;
  transition:.2s;
}
.form-input:focus { border-color:var(--sage); background:var(--white); box-shadow:0 0 0 3px rgba(143,168,102,.14); }

.auth-submit {
  width:100%;
  margin-top:10px;
  padding:13px;
  background:var(--sage-deep);
  color:#fff;
  border:none;
  border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;
  font-size:.82rem;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  cursor:pointer;
  transition:.25s;
}
.auth-submit:hover { background:var(--sage-dark); }

.auth-error {
  margin-top:14px;
  padding:10px 14px;
  background:rgba(192,57,43,.08);
  border:1px solid rgba(192,57,43,.25);
  border-radius:var(--radius-sm);
  font-size:.8rem;
  color:var(--red);
  text-align:center;
}

/* ════════════════════════════
   APP SHELL
════════════════════════════ */
.app-shell {
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width:220px;
  flex-shrink:0;
  background:var(--sage-deep);
  display:flex;
  flex-direction:column;
  padding:0;
  overflow-y:auto;
  position:relative;
  z-index:20;
}

.sidebar-brand {
  padding:28px 22px 24px;
  border-bottom:1px solid rgba(255,255,255,.1);
}

.sidebar-brand-name {
  font-family:'Cormorant Garamond', serif;
  font-size:1.3rem;
  font-weight:500;
  color:#fff;
  line-height:1.15;
}

.sidebar-brand-sub {
  font-size:.65rem;
  font-weight:500;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:rgba(255,255,255,.45);
  margin-top:3px;
}

.sidebar-user {
  display:flex;
  align-items:center;
  gap:10px;
  padding:16px 22px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.sidebar-avatar {
  width:34px; height:34px;
  background:var(--sage-light);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:.8rem; font-weight:700; color:var(--sage-deep);
  flex-shrink:0;
}

.sidebar-user-info strong {
  display:block;
  font-size:.78rem; font-weight:600; color:#fff;
}
.sidebar-user-info span {
  font-size:.65rem; color:rgba(255,255,255,.45);
}

.sidebar-menu { padding:14px 0; flex:1; }

.sidebar-section-label {
  font-size:.58rem;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:rgba(255,255,255,.3);
  padding:10px 22px 6px;
}

.nav-item {
  display:flex;
  align-items:center;
  gap:11px;
  padding:10px 22px;
  cursor:pointer;
  transition:.18s;
  border-radius:0;
  color:rgba(255,255,255,.6);
  font-size:.82rem;
  font-weight:500;
  position:relative;
}
.nav-item:hover { background:rgba(255,255,255,.07); color:rgba(255,255,255,.9); }
.nav-item.active {
  background:rgba(255,255,255,.14);
  color:#fff;
  font-weight:600;
}
.nav-item.active::before {
  content:'';
  position:absolute;
  left:0; top:0; bottom:0;
  width:3px;
  background:var(--sage-light);
  border-radius:0 2px 2px 0;
}
.nav-icon { font-size:1rem; width:20px; text-align:center; flex-shrink:0; }

.sidebar-logout {
  padding:16px 22px;
  border-top:1px solid rgba(255,255,255,.08);
}
.logout-btn {
  display:flex; align-items:center; gap:10px;
  cursor:pointer; color:rgba(255,255,255,.4);
  font-size:.78rem; font-weight:500;
  transition:.2s; background:none; border:none; width:100%;
}
.logout-btn:hover { color:rgba(255,255,255,.8); }

/* ── MAIN AREA ── */
.main-area {
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.topbar {
  height:60px;
  background:var(--white);
  border-bottom:1px solid var(--cream-mid);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 32px;
  flex-shrink:0;
}

.topbar-title {
  font-size:1.05rem;
  font-weight:700;
  color:var(--ink);
}

.topbar-right {
  display:flex; align-items:center; gap:16px;
}

.topbar-date {
  font-size:.76rem;
  color:var(--ink-soft);
  font-family:'DM Mono', monospace;
}

.badge-pill {
  display:inline-flex; align-items:center;
  padding:4px 12px;
  border-radius:99px;
  font-size:.7rem;
  font-weight:600;
  letter-spacing:.04em;
}
.badge-active   { background:rgba(143,168,102,.15); color:var(--sage-dark); }
.badge-leave    { background:rgba(212,143,26,.12);  color:var(--amber); }
.badge-resigned { background:rgba(192,57,43,.10);   color:var(--red); }
.badge-present  { background:rgba(143,168,102,.15); color:var(--sage-dark); }
.badge-late     { background:rgba(212,143,26,.12);  color:var(--amber); }
.badge-absent   { background:rgba(192,57,43,.10);   color:var(--red); }

.page-body {
  flex:1;
  overflow-y:auto;
  padding:28px 32px;
}

/* ── METRIC CARDS ── */
.metric-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  margin-bottom:28px;
}
@media(max-width:1100px){ .metric-grid { grid-template-columns:repeat(2,1fr); } }

.metric-card {
  background:var(--white);
  border-radius:var(--radius-md);
  padding:24px 24px 20px;
  box-shadow:var(--shadow-sm);
  border:1px solid var(--cream-mid);
  position:relative;
  overflow:hidden;
}
.metric-card::after {
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:3px;
  background:var(--sage-light);
  border-radius:var(--radius-md) var(--radius-md) 0 0;
}
.metric-card.accent-amber::after { background:var(--amber); }
.metric-card.accent-red::after   { background:var(--red); }
.metric-card.accent-blue::after  { background:var(--blue); }

.metric-label {
  font-size:.67rem;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--ink-ghost);
  margin-bottom:10px;
}
.metric-value {
  font-size:2.2rem;
  font-weight:700;
  color:var(--ink);
  line-height:1;
  font-family:'DM Mono', monospace;
}
.metric-sub {
  font-size:.72rem;
  color:var(--ink-soft);
  margin-top:6px;
}
.metric-icon {
  position:absolute;
  right:20px; top:50%;
  transform:translateY(-50%);
  font-size:2.4rem;
  opacity:.07;
}

/* ── SECTION CARDS ── */
.section-card {
  background:var(--white);
  border-radius:var(--radius-md);
  padding:24px 28px;
  box-shadow:var(--shadow-sm);
  border:1px solid var(--cream-mid);
  margin-bottom:22px;
}

.section-head {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}

.section-title {
  font-size:.78rem;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--ink-mid);
}

/* ── BUTTON ── */
.btn {
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 18px;
  border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;
  font-size:.78rem; font-weight:600; letter-spacing:.04em;
  cursor:pointer; transition:.2s; border:none;
}
.btn-primary { background:var(--sage-deep); color:#fff; }
.btn-primary:hover { background:var(--sage-dark); }
.btn-ghost { background:var(--cream); color:var(--ink-mid); border:1px solid var(--cream-dark); }
.btn-ghost:hover { background:var(--cream-mid); }
.btn-danger { background:rgba(192,57,43,.1); color:var(--red); border:1px solid rgba(192,57,43,.2); }
.btn-danger:hover { background:rgba(192,57,43,.18); }
.btn-sm { padding:6px 13px; font-size:.72rem; }
.btn-print { background:var(--sage-pale); color:var(--sage-deep); border:1px solid var(--sage-light); }
.btn-print:hover { background:var(--sage-light); }

/* ── TABLE ── */
.data-table { width:100%; border-collapse:collapse; }
.data-table th {
  font-size:.65rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--ink-ghost); padding:10px 14px; text-align:left;
  border-bottom:1.5px solid var(--cream-mid); white-space:nowrap;
}
.data-table td {
  padding:13px 14px; font-size:.82rem; color:var(--ink);
  border-bottom:1px solid var(--cream-mid); vertical-align:middle;
}
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:var(--cream); }

.td-name { font-weight:600; }
.td-id   { font-family:'DM Mono',monospace; font-size:.75rem; color:var(--ink-soft); }
.td-mono { font-family:'DM Mono',monospace; font-size:.78rem; }

.action-btns { display:flex; gap:6px; }

/* ── PROGRESS BARS ── */
.prog-bar-wrap { background:var(--cream-mid); border-radius:99px; height:7px; overflow:hidden; margin-top:4px; }
.prog-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--sage),var(--sage-light)); }

.dept-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.dept-name { font-size:.82rem; font-weight:500; color:var(--ink); }
.dept-count { font-size:.72rem; font-family:'DM Mono',monospace; color:var(--ink-soft); }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; z-index:1000;
  background:rgba(10,20,8,.45);
  backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  padding:24px;
  animation:fadeIn .18s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal-box {
  background:var(--white);
  border-radius:var(--radius-lg);
  padding:32px 36px;
  width:100%; max-width:580px;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:var(--shadow-lg);
  animation:slideUp .22s cubic-bezier(.34,1.4,.64,1);
}
@keyframes slideUp { from{transform:translateY(24px);opacity:0} to{transform:none;opacity:1} }

.modal-title {
  font-size:1.05rem; font-weight:700; color:var(--ink);
  margin-bottom:22px; padding-bottom:16px;
  border-bottom:1px solid var(--cream-mid);
  display:flex; align-items:center; justify-content:space-between;
}
.modal-close {
  background:none; border:none; cursor:pointer;
  color:var(--ink-ghost); font-size:1.3rem; line-height:1;
  transition:.2s;
}
.modal-close:hover { color:var(--ink); }

/* modal form */
.mform-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.mform-full { grid-column:1/-1; }

.mform-label {
  display:block; font-size:.67rem; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  color:var(--ink-soft); margin-bottom:6px;
}
.mform-input, .mform-select, .mform-textarea {
  width:100%; padding:10px 13px;
  border:1.5px solid var(--cream-dark);
  border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif; font-size:.85rem;
  color:var(--ink); background:var(--cream);
  outline:none; transition:.2s;
}
.mform-input:focus, .mform-select:focus, .mform-textarea:focus {
  border-color:var(--sage); background:var(--white);
  box-shadow:0 0 0 3px rgba(143,168,102,.13);
}
.mform-textarea { min-height:72px; resize:vertical; }

.modal-footer {
  display:flex; justify-content:flex-end; gap:10px;
  margin-top:24px; padding-top:18px;
  border-top:1px solid var(--cream-mid);
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align:center; padding:48px 24px;
  color:var(--ink-ghost);
}
.empty-state-icon { font-size:2.8rem; margin-bottom:12px; opacity:.4; }
.empty-state p { font-size:.85rem; }

/* ── DASHBOARD SUMMARY LIST ── */
.summary-list { list-style:none; }
.summary-list li {
  display:flex; justify-content:space-between; align-items:center;
  padding:11px 0;
  border-bottom:1px solid var(--cream-mid);
  font-size:.83rem;
}
.summary-list li:last-child { border-bottom:none; }
.sl-label { color:var(--ink-soft); }
.sl-value { font-weight:600; font-family:'DM Mono',monospace; color:var(--ink); }

/* ── PRINT ── */
@media print {
  .sidebar, .topbar, .no-print { display:none !important; }
  .main-area { overflow:visible; }
  .page-body { padding:0; }
  .section-card { box-shadow:none; border:1px solid #ddd; page-break-inside:avoid; }
  .btn { display:none; }
}

/* ── MISC ── */
.text-right { text-align:right; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:22px; }
@media(max-width:860px){ .two-col { grid-template-columns:1fr; } }

.net-salary-box {
  background:var(--sage-pale);
  border:1.5px solid var(--sage-light);
  border-radius:var(--radius-sm);
  padding:14px 16px;
  margin-top:4px;
}
.net-salary-label { font-size:.67rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--sage-dark); margin-bottom:4px; }
.net-salary-value { font-size:1.5rem; font-weight:700; font-family:'DM Mono',monospace; color:var(--sage-deep); }

.search-input {
  padding:8px 14px;
  border:1.5px solid var(--cream-dark);
  border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;
  font-size:.82rem; color:var(--ink); background:var(--cream);
  outline:none; transition:.2s; width:220px;
}
.search-input:focus { border-color:var(--sage); background:var(--white); }

.payroll-total-row td { font-weight:700; border-top:2px solid var(--cream-dark) !important; background:var(--cream) !important; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

/* ════ SEED DATA ════ */
const SEED_EMPLOYEES = [

  { id:'EMP-004', name:'Ramon Dela Cruz', email:'ramon@wellhall.ph',   contact:'+63 919 777 8888', position:'Housekeeping Lead',   department:'Rooms',      hired:'2021-05-20', status:'Active' },
  { id:'EMP-005', name:'Luz Bautista',    email:'luz@wellhall.ph',     contact:'+63 920 999 0000', position:'Events Coordinator',  department:'Events',     hired:'2019-11-03', status:'Resigned' },
];

const SEED_SALARIES = {
  'EMP-001': { basic:35000, allowance:5000, deductions:3500 },
  'EMP-002': { basic:50000, allowance:8000, deductions:5500 },
  'EMP-003': { basic:28000, allowance:3000, deductions:2800 },
  'EMP-004': { basic:24000, allowance:2500, deductions:2400 },

/* ── Modal ── */
function Modal({ title, onClose, children, footer }) {
  return (
    <div className="modal-overlay" onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-box">
        <div className="modal-title">
          <span>{title}</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {children}
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

/* ── Employee Modal ── */
function EmployeeModal({ emp, onSave, onClose }) {
  const blank = { id:'', name:'', email:'', contact:'', position:'', department:DEPTS[0], hired:today(), status:'Active' };
  const [form, setForm] = useState(emp || blank);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const handleSave = () => {
    if (!form.name || !form.email || !form.position) return alert('Name, email, and position are required.');
    onSave({ ...form, id: form.id || 'EMP-' + String(Date.now()).slice(-4) });
  };
  return (
    <Modal title={emp ? 'Edit Employee' : 'Add Employee'} onClose={onClose}
      footer={<><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={handleSave}>Save Employee</button></>}>
      <div className="mform-grid">
        <div><label className="mform-label">Full Name *</label><input className="mform-input" value={form.name} onChange={set('name')} /></div>
        <div><label className="mform-label">Employee ID</label><input className="mform-input" value={form.id} onChange={set('id')} placeholder="Auto-assigned" /></div>
        <div><label className="mform-label">Email *</label><input className="mform-input" type="email" value={form.email} onChange={set('email')} /></div>
        <div><label className="mform-label">Contact Number</label><input className="mform-input" value={form.contact} onChange={set('contact')} /></div>
        <div><label className="mform-label">Position *</label><input className="mform-input" value={form.position} onChange={set('position')} /></div>
        <div><label className="mform-label">Department</label>
          <select className="mform-select" value={form.department} onChange={set('department')}>
            {DEPTS.map(d=><option key={d}>{d}</option>)}</select></div>
        <div><label className="mform-label">Date Hired</label><input className="mform-input" type="date" value={form.hired} onChange={set('hired')} /></div>
        <div><label className="mform-label">Status</label>
          <select className="mform-select" value={form.status} onChange={set('status')}>
            {STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
      </div>
    </Modal>
  );
}

/* ── Salary Modal ── */
function SalaryModal({ emp, salary, onSave, onClose }) {
  const blank = { basic:0, allowance:0, deductions:0 };
  const [form, setForm] = useState(salary || blank);
  const set = k => e => setForm(f=>({...f,[k]:parseFloat(e.target.value)||0}));
  const net = (form.basic||0) + (form.allowance||0) - (form.deductions||0);
  return (
    <Modal title={`Salary — ${emp.name}`} onClose={onClose}
      footer={<><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={()=>onSave(emp.id, form)}>Save Salary</button></>}>
      <div className="mform-grid">
        <div><label className="mform-label">Basic Salary (₱)</label><input className="mform-input" type="number" value={form.basic} onChange={set('basic')} /></div>
        <div><label className="mform-label">Allowance (₱)</label><input className="mform-input" type="number" value={form.allowance} onChange={set('allowance')} /></div>
        <div className="mform-full"><label className="mform-label">Deductions (₱)</label><input className="mform-input" type="number" value={form.deductions} onChange={set('deductions')} /></div>
        <div className="mform-full">
          <div className="net-salary-box">
            <div className="net-salary-label">Computed Net Salary</div>
            <div className="net-salary-value">{fmt(Math.max(net,0))}</div>
          </div>
        </div>
      </div>
    </Modal>
  );
}

/* ── Attendance Modal ── */
function AttendanceModal({ employees, onSave, onClose, record }) {
  const blank = { empId: employees[0]?.id||'', name:'', date:today(), timeIn:'08:00', timeOut:'17:00', status:'Present' };
  const [form, setForm] = useState(record || blank);
  const set = k => e => {
    const v = e.target.value;
    if(k==='empId'){
      const emp = employees.find(x=>x.id===v);
      setForm(f=>({...f, empId:v, name:emp?.name||''}));
    } else setForm(f=>({...f,[k]:v}));
  };
  const handleSave = () => {
    const emp = employees.find(x=>x.id===form.empId);
    onSave({ ...form, name: emp?.name||form.name, id: form.id || Date.now() });
  };
  return (
    <Modal title={record?'Edit Record':'Log Attendance'} onClose={onClose}
      footer={<><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={handleSave}>Save Record</button></>}>
      <div className="mform-grid">
        <div className="mform-full"><label className="mform-label">Employee</label>
          <select className="mform-select" value={form.empId} onChange={set('empId')}>
            {employees.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select></div>
        <div><label className="mform-label">Date</label><input className="mform-input" type="date" value={form.date} onChange={set('date')} /></div>
        <div><label className="mform-label">Status</label>
          <select className="mform-select" value={form.status} onChange={set('status')}>
            {ATT_STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
        <div><label className="mform-label">Time In</label><input className="mform-input" type="time" value={form.timeIn} onChange={set('timeIn')} /></div>
        <div><label className="mform-label">Time Out</label><input className="mform-input" type="time" value={form.timeOut} onChange={set('timeOut')} /></div>
      </div>
    </Modal>
  );
}

/* ── DASHBOARD ── */
function Dashboard({ employees, salaries, attendance }) {
  const active   = employees.filter(e=>e.status==='Active').length;
  const onLeave  = employees.filter(e=>e.status==='On Leave').length;
  const resigned = employees.filter(e=>e.status==='Resigned').length;
  const totalPayroll = employees.reduce((sum,e)=>{
    const s = salaries[e.id];
    if(!s) return sum;
    return sum + s.basic + s.allowance - s.deductions;
  },0);

  const deptCounts = DEPTS.map(d=>({ dept:d, count:employees.filter(e=>e.department===d).length })).filter(x=>x.count>0);
  const maxCount = Math.max(...deptCounts.map(x=>x.count),1);

  const todayAtt = attendance.filter(a=>a.date===today());

  return (
    <div>
      <div className="metric-grid">
        <div className="metric-card"><div className="metric-label">Total Employees</div><div className="metric-value">{employees.length}</div><div className="metric-sub">All staff records</div><div className="metric-icon">👥</div></div>
        <div className="metric-card"><div className="metric-label">Active</div><div className="metric-value">{active}</div><div className="metric-sub">Currently working</div><div className="metric-icon">✅</div></div>
        <div className="metric-card accent-amber"><div className="metric-label">On Leave</div><div className="metric-value">{onLeave}</div><div className="metric-sub">Approved absences</div><div className="metric-icon">🏖️</div></div>
        <div className="metric-card accent-blue"><div className="metric-label">Monthly Payroll</div><div className="metric-value" style={{fontSize:'1.35rem'}}>{fmt(totalPayroll)}</div><div className="metric-sub">Net across all staff</div><div className="metric-icon">💰</div></div>
      </div>

      <div className="two-col">
        <div className="section-card">
          <div className="section-head"><div className="section-title">Department Breakdown</div></div>
          {deptCounts.map(({dept,count})=>(
            <div key={dept} className="dept-row">
              <div>
                <div className="dept-name">{dept}</div>
                <div className="prog-bar-wrap" style={{width:180}}><div className="prog-bar-fill" style={{width:`${(count/maxCount)*100}%`}}></div></div>
              </div>
              <div className="dept-count">{count} staff</div>
            </div>
          ))}
          {deptCounts.length===0&&<div className="empty-state"><div className="empty-state-icon">📊</div><p>No department data yet.</p></div>}
        </div>

        <div className="section-card">
          <div className="section-head"><div className="section-title">Today's Attendance</div></div>
          {todayAtt.length===0 ? <div className="empty-state"><div className="empty-state-icon">📋</div><p>No attendance logged today.</p></div>
          : <ul className="summary-list">
              {todayAtt.map(a=>(
                <li key={a.id}>
                  <div className="sl-label">{a.name}</div>
                  <span className={`badge-pill badge-${a.status.toLowerCase().replace(' ','-')}`}>{a.status}</span>
                </li>
              ))}
            </ul>}
        </div>
      </div>

      <div className="section-card">
        <div className="section-head"><div className="section-title">Recent Employees</div></div>
        <table className="data-table">
          <thead><tr><th>ID</th><th>Name</th><th>Position</th><th>Department</th><th>Status</th></tr></thead>
          <tbody>
            {employees.slice(0,5).map(e=>(
              <tr key={e.id}>
                <td className="td-id">{e.id}</td>
                <td className="td-name">{e.name}</td>
                <td>{e.position}</td>
                <td>{e.department}</td>
                <td><span className={`badge-pill badge-${e.status.toLowerCase().replace(' ','-')}`}>{e.status}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── EMPLOYEES PAGE ── */
function EmployeesPage({ employees, setEmployees }) {
  const [search, setSearch] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);

  const filtered = employees.filter(e=>
    e.name.toLowerCase().includes(search.toLowerCase()) ||
    e.id.toLowerCase().includes(search.toLowerCase()) ||
    e.department.toLowerCase().includes(search.toLowerCase())
  );

  const saveEmp = (emp) => {
    setEmployees(prev => editing ? prev.map(e=>e.id===emp.id?emp:e) : [...prev, emp]);
    setShowModal(false); setEditing(null);
  };

  const deleteEmp = (id) => { if(window.confirm('Delete this employee?')) setEmployees(prev=>prev.filter(e=>e.id!==id)); };

  return (
    <div>
      <div className="section-card">
        <div className="section-head">
          <div className="section-title">All Employees ({employees.length})</div>
          <div style={{display:'flex',gap:10}}>
            <input className="search-input" placeholder="Search name, ID, dept…" value={search} onChange={e=>setSearch(e.target.value)} />
            <button className="btn btn-primary" onClick={()=>{setEditing(null);setShowModal(true);}}>＋ Add Employee</button>
          </div>
        </div>
        {filtered.length===0
          ? <div className="empty-state"><div className="empty-state-icon">👥</div><p>No employees found.</p></div>
          : <table className="data-table">
              <thead><tr><th>ID</th><th>Name</th><th>Position</th><th>Department</th><th>Date Hired</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                {filtered.map(e=>(
                  <tr key={e.id}>
                    <td className="td-id">{e.id}</td>
                    <td className="td-name">{e.name}<div style={{fontSize:'.72rem',color:'var(--ink-ghost)'}}>{e.email}</div></td>
                    <td>{e.position}</td>
                    <td>{e.department}</td>
                    <td className="td-mono">{e.hired}</td>
                    <td><span className={`badge-pill badge-${e.status.toLowerCase().replace(' ','-')}`}>{e.status}</span></td>
                    <td><div className="action-btns">
                      <button className="btn btn-ghost btn-sm" onClick={()=>{setEditing(e);setShowModal(true);}}>Edit</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>deleteEmp(e.id)}>Delete</button>
                    </div></td>
                  </tr>
                ))}
              </tbody>
            </table>
        }
      </div>
      {showModal && <EmployeeModal emp={editing} onSave={saveEmp} onClose={()=>{setShowModal(false);setEditing(null);}} />}
    </div>
  );
}

/* ── SALARY PAGE ── */
function SalaryPage({ employees, salaries, setSalaries }) {

  const [selectedEmp, setSelectedEmp] = useState(null);

  const openModal = (emp) => { setSelectedEmp(emp); setShowModal(true); };
  const saveSalary = (empId, data) => { setSalaries(prev=>({...prev,[empId]:data})); setShowModal(false); };

  return (
    <div>
      <div className="section-card">
        <div className="section-head"><div className="section-title">Salary Management</div></div>
        <table className="data-table">
          <thead><tr><th>Employee</th><th>Position</th><th>Basic Salary</th><th>Allowance</th><th>Deductions</th><th>Net Salary</th><th>Action</th></tr></thead>
          <tbody>
            {employees.map(e=>{
              const s = salaries[e.id] || { basic:0, allowance:0, deductions:0 };

/* ── PAYROLL SUMMARY PAGE ── */
function PayrollPage({ employees, salaries }) {
  const rows = employees.map(e=>{
    const s = salaries[e.id]||{basic:0,allowance:0,deductions:0};
    const net = s.basic + s.allowance - s.deductions;
    return { ...e, ...s, net: Math.max(net,0) };
  });

  const totalBasic       = rows.reduce((s,r)=>s+r.basic,0);
  const totalAllowance   = rows.reduce((s,r)=>s+r.allowance,0);
  const totalDeductions  = rows.reduce((s,r)=>s+r.deductions,0);
  const totalNet         = rows.reduce((s,r)=>s+r.net,0);

  const handlePrint = () => window.print();

  return (
    <div>
      <div className="section-card">
        <div className="section-head">
          <div>
            <div className="section-title">Payroll Summary</div>
            <div style={{fontSize:'.72rem',color:'var(--ink-ghost)',marginTop:4}}>Period: {todayDisplay()}</div>
          </div>
          <button className="btn btn-print no-print" onClick={handlePrint}>🖨 Print Summary</button>
        </div>

        <table className="data-table">
          <thead>
            <tr>
              <th>Employee</th>
              <th>Position</th>
              <th className="text-right">Basic Salary</th>
              <th className="text-right">Allowance</th>
              <th className="text-right">Deductions</th>
              <th className="text-right">Net Salary</th>
            </tr>
          </thead>
          <tbody>
            {rows.map(r=>(
              <tr key={r.id}>
                <td className="td-name">{r.name}</td>
                <td style={{fontSize:'.78rem',color:'var(--ink-soft)'}}>{r.position}</td>
                <td className="td-mono text-right">{fmt(r.basic)}</td>
                <td className="td-mono text-right">{fmt(r.allowance)}</td>
                <td className="td-mono text-right" style={{color:'var(--red)'}}>{fmt(r.deductions)}</td>
                <td className="td-mono text-right" style={{fontWeight:700,color:'var(--sage-deep)'}}>{fmt(r.net)}</td>
              </tr>
            ))}
            <tr className="payroll-total-row">
              <td colSpan={2}><strong>TOTAL</strong></td>
              <td className="td-mono text-right"><strong>{fmt(totalBasic)}</strong></td>
              <td className="td-mono text-right"><strong>{fmt(totalAllowance)}</strong></td>
              <td className="td-mono text-right" style={{color:'var(--red)'}}><strong>{fmt(totalDeductions)}</strong></td>
              <td className="td-mono text-right" style={{color:'var(--sage-deep)'}}><strong>{fmt(totalNet)}</strong></td>
            </tr>
          </tbody>
        </table>

        <div style={{marginTop:28,display:'flex',gap:16,flexWrap:'wrap'}}>
          {[['Total Basic',totalBasic,'var(--ink)'],['Total Allowance',totalAllowance,'var(--blue)'],
            ['Total Deductions',totalDeductions,'var(--red)'],['Total Net Payroll',totalNet,'var(--sage-deep)']].map(([label,val,color])=>(
            <div key={label} className="metric-card" style={{flex:'1 1 160px',minWidth:160}}>
              <div className="metric-label">{label}</div>
              <div className="metric-value" style={{fontSize:'1.1rem',color}}>{fmt(val)}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

  { id:'employees',   icon:'👥', label:'Employees' },
  { id:'salary',      icon:'💼', label:'Salary' },
  { id:'attendance',  icon:'📋', label:'Attendance' },
  { id:'payroll',     icon:'📊', label:'Payroll Summary' },
];

/* ── APP SHELL ── */
function AppShell({ user, onLogout, employees, setEmployees, salaries, setSalaries, attendance, setAttendance }) {
  const [page, setPage] = useState('dashboard');

  const pages = {
    dashboard: <Dashboard employees={employees} salaries={salaries} attendance={attendance} />,
    employees: <EmployeesPage employees={employees} setEmployees={setEmployees} />,
    salary:    <SalaryPage employees={employees} salaries={salaries} setSalaries={setSalaries} />,
    attendance:<AttendancePage employees={employees} attendance={attendance} setAttendance={setAttendance} />,
    payroll:   <PayrollPage employees={employees} salaries={salaries} />,
  };

  const pageTitles = { dashboard:'Dashboard', employees:'Employee Management', salary:'Salary Management', attendance:'Attendance Management', payroll:'Payroll Summary' };

  return (
    <div className="app-shell">
      <aside className="sidebar">
        <div className="sidebar-brand">
          <div className="sidebar-brand-name">The Wellhall</div>
          <div className="sidebar-brand-sub">Staff Portal</div>
        </div>
        <div className="sidebar-user">
          <div className="sidebar-avatar">{user.name.charAt(0)}</div>
          <div className="sidebar-user-info">
            <strong>{user.name}</strong>
            <span>{user.role}</span>
          </div>
        </div>
        <nav className="sidebar-menu">
          <div className="sidebar-section-label">Navigation</div>
          {NAV.map(n=>(
            <div key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              <span>{n.label}</span>
            </div>
          ))}
        </nav>
        <div className="sidebar-logout">
          <button className="logout-btn" onClick={onLogout}>
            <span>⬅</span> Log Out
          </button>
        </div>
      </aside>

      <div className="main-area">
        <div className="topbar">
          <div className="topbar-title">{pageTitles[page]}</div>
          <div className="topbar-right">
            <span className="topbar-date">{todayDisplay()}</span>
          </div>
        </div>
        <div className="page-body">
          {pages[page]}
        </div>
      </div>
    </div>
  );
}

/* ── ROOT ── */
function App() {
  const [user, setUser]             = useState(null);
  const [employees, setEmployees]   = useState(SEED_EMPLOYEES);
  const [salaries, setSalaries]     = useState(SEED_SALARIES);
  const [attendance, setAttendance] = useState(SEED_ATTENDANCE);

  if (!user) return <LoginPage onLogin={setUser} />;

  return (
    <AppShell
      user={user}
      onLogout={()=>setUser(null)}
      employees={employees} setEmployees={setEmployees}
      salaries={salaries}   setSalaries={setSalaries}
      attendance={attendance} setAttendance={setAttendance}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
